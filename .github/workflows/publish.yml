name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # NPM OIDC 认证必需的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@11.15.1 --activate

      - name: Setup npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (shared + client)
        run: pnpm run build:shared && pnpm run build:client

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/client
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ github.event.inputs.version }} -m "chore: bump version to %s [skip ci]"
          git push
          git push --tags

      - name: Publish to npm (trusted publishing)
        working-directory: packages/client
        run: npm publish --access public
